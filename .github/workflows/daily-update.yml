name: Daily API Price Update

on:
  schedule:
    # 每日北京时间 9:00（UTC 1:00）触发
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发，用于测试

permissions:
  contents: write   # 允许 Actions 提交数据回仓库
  pages: write      # GitHub Pages 部署
  id-token: write   # OIDC 令牌（deploy-pages 需要）

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Visualize dashboard
        run: python visualize.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp price_dashboard.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Commit data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.xlsx
          git diff --staged --quiet || git commit -m "data: update $(date -u +%Y-%m-%d) price snapshot"
          git push

      - name: Summary
        run: |
          echo "=== 部署完成 ==="
          echo "访问地址: ${{ steps.deploy.outputs.page_url }}"
          echo "数据更新时间: $(date -u)"
